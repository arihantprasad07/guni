<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Secure your AI agents with Guni."/>
<title>Guni — Secure your AI agents</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<link rel="stylesheet" href="/static/guni.css"/>
<style>
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem var(--pad)}
.auth-card{width:100%;max-width:400px}
.auth-logo{font-family:var(--display);font-size:28px;font-weight:800;color:var(--amber);letter-spacing:-0.04em;margin-bottom:2rem;display:block;text-decoration:none}
.auth-logo em{color:var(--muted2);font-style:normal;font-weight:400;font-size:18px}
.auth-title{font-family:var(--display);font-size:1.8rem;font-weight:700;margin-bottom:0.5rem;letter-spacing:-0.03em}
.auth-sub{font-size:13px;color:var(--muted2);margin-bottom:2rem;line-height:1.7}
.auth-form{display:flex;flex-direction:column;gap:1rem}
.field{display:flex;flex-direction:column;gap:5px}
.err{font-size:12px;color:var(--red);padding:10px 14px;border:1px solid rgba(240,64,64,0.2);background:var(--red2);display:none}
.err.show{display:block}
.ok{font-size:12px;color:var(--green);padding:10px 14px;border:1px solid rgba(0,217,126,0.2);background:rgba(0,217,126,0.06);display:none}
.ok.show{display:block}
.auth-footer{margin-top:1.5rem;font-size:12px;color:var(--muted2);text-align:center}
.auth-footer a{color:var(--amber);text-decoration:none}
</style>
</head>
<body class="g-page">
<div class="auth-wrap">
  <div class="auth-card" id="forgot-card">
    <a class="auth-logo" href="/">guni<em>.dev</em></a>
    <h1 class="auth-title">Forgot password?</h1>
    <p class="auth-sub">Enter your email and we'll send you a reset link.</p>
    <div class="auth-form">
      <div class="field">
        <label class="g-field-label">Email</label>
        <input class="g-input" type="email" id="reset-email" placeholder="you@company.com"/>
      </div>
      <div class="err" id="reset-err"></div>
      <div class="ok" id="reset-ok"></div>
      <button class="g-btn g-btn-primary" id="request-reset-btn" style="padding:13px;font-size:13px" type="button">Send reset link</button>
    </div>
    <div class="auth-footer"><a href="/signin">Back to sign in</a></div>
  </div>

  <div class="auth-card" id="newpass-card" style="display:none">
    <a class="auth-logo" href="/">guni<em>.dev</em></a>
    <h1 class="auth-title">Set new password</h1>
    <p class="auth-sub">Enter your new password below.</p>
    <div class="auth-form">
      <div class="field">
        <label class="g-field-label">New password</label>
        <input class="g-input" type="password" id="new-pass" placeholder="Min 8 characters"/>
      </div>
      <div class="field">
        <label class="g-field-label">Confirm password</label>
        <input class="g-input" type="password" id="new-confirm" placeholder="Repeat password"/>
      </div>
      <div class="err" id="np-err"></div>
      <div class="ok" id="np-ok"></div>
      <button class="g-btn g-btn-primary" id="reset-password-btn" style="padding:13px;font-size:13px" type="button">Set new password</button>
    </div>
    <div class="auth-footer"><a href="/signin">Back to sign in</a></div>
  </div>
</div>

<script>
const resetToken = 'RESET_TOKEN_PLACEHOLDER';

if (resetToken && resetToken !== 'RESET_TOKEN_PLACEHOLDER') {
  document.getElementById('forgot-card').style.display = 'none';
  document.getElementById('newpass-card').style.display = 'block';
}

async function requestReset(button) {
  const email = document.getElementById('reset-email').value.trim();
  const err = document.getElementById('reset-err');
  const ok = document.getElementById('reset-ok');
  err.classList.remove('show');
  ok.classList.remove('show');
  if (!email || !email.includes('@')) {
    err.textContent = 'Enter a valid email.';
    err.classList.add('show');
    return;
  }
  const btn = button || document.getElementById('request-reset-btn');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    await fetch('/auth/reset-request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    ok.textContent = 'If that email exists, a reset link has been sent. Check your inbox.';
    ok.classList.add('show');
  } catch (e) {
    err.textContent = 'Could not connect. Try again.';
    err.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  }
}

async function resetPassword(button) {
  const password = document.getElementById('new-pass').value;
  const confirm = document.getElementById('new-confirm').value;
  const err = document.getElementById('np-err');
  const ok = document.getElementById('np-ok');
  err.classList.remove('show');
  ok.classList.remove('show');
  if (password.length < 8) {
    err.textContent = 'Password must be at least 8 characters.';
    err.classList.add('show');
    return;
  }
  if (password !== confirm) {
    err.textContent = 'Passwords do not match.';
    err.classList.add('show');
    return;
  }
  const btn = button || document.getElementById('reset-password-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  try {
    const r = await fetch('/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, password }),
    });
    const d = await r.json();
    if (!r.ok) {
      err.textContent = d.detail || 'Invalid or expired link.';
      err.classList.add('show');
      return;
    }
    ok.textContent = 'Password updated. Redirecting to sign in...';
    ok.classList.add('show');
    setTimeout(() => window.location.href = '/signin', 2000);
  } catch (e) {
    err.textContent = 'Could not connect. Try again.';
    err.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Set new password';
  }
}

document.getElementById('request-reset-btn')?.addEventListener('click', (event) => {
  requestReset(event.currentTarget);
});
document.getElementById('reset-password-btn')?.addEventListener('click', (event) => {
  resetPassword(event.currentTarget);
});
</script>
</body>
</html>
