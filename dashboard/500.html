<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Guni hit an internal error while handling your request."/>
<title>Server Error | Guni</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<link rel="stylesheet" href="/static/guni.css"/>
<style>
.error-shell{min-height:100vh;display:grid;place-items:center;padding:calc(56px + 2rem) var(--pad) 3rem}
.error-card{max-width:760px;width:100%;padding:clamp(1.5rem,4vw,3rem);border:1px solid rgba(240,64,64,0.24);background:linear-gradient(135deg,rgba(240,64,64,0.08),rgba(245,166,35,0.05))}
.error-code{font-family:var(--display);font-size:clamp(4rem,14vw,8rem);line-height:.9;color:var(--red);margin-bottom:1rem}
.error-copy{max-width:560px;font-size:13px;color:var(--muted3);line-height:1.8;margin-bottom:1.5rem}
.error-actions{display:flex;gap:10px;flex-wrap:wrap}
</style>
</head>
<body class="g-page">
<main class="error-shell">
  <div class="error-card">
    <div class="g-eyebrow">500</div>
    <div class="error-code">Request interrupted.</div>
    <h1 class="g-title-md" style="margin-bottom:.75rem">Something went wrong on our side.</h1>
    <p class="error-copy">The request did not complete successfully. Try again in a moment, or head back to the portal, docs, or demo while the service recovers.</p>
    <div class="error-actions">
      <a class="g-btn g-btn-primary" href="/">Back home</a>
      <a class="g-btn g-btn-outline" href="/portal">Open portal</a>
      <a class="g-btn g-btn-outline" href="/status">Service status</a>
    </div>
  </div>
</main>
