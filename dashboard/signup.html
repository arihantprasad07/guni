<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Secure your AI agents with Guni."/>
<title>Guni — Secure your AI agents</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<link rel="stylesheet" href="/static/guni.css"/>
<style>
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem var(--pad)}
.auth-card{width:100%;max-width:520px}
.auth-logo{font-family:var(--display);font-size:28px;font-weight:800;color:var(--amber);letter-spacing:-0.04em;margin-bottom:2rem;display:block;text-decoration:none}
.auth-logo em{color:var(--muted2);font-style:normal;font-weight:400;font-size:18px}
.auth-title{font-family:var(--display);font-size:1.8rem;font-weight:700;margin-bottom:0.5rem;letter-spacing:-0.03em}
.auth-sub{font-size:13px;color:var(--muted2);margin-bottom:2rem;line-height:1.7}
.auth-form{display:flex;flex-direction:column;gap:1rem}
.field{display:flex;flex-direction:column;gap:5px}
.err{font-size:12px;color:var(--red);padding:10px 14px;border:1px solid rgba(240,64,64,0.2);background:var(--red2);display:none}
.err.show{display:block}
.ok{font-size:12px;color:var(--green);padding:10px 14px;border:1px solid rgba(0,217,126,0.2);background:rgba(0,217,126,0.06);display:none}
.ok.show{display:block}
.auth-footer{margin-top:1.5rem;font-size:12px;color:var(--muted2);text-align:center}
.auth-footer a{color:var(--amber);text-decoration:none}
.auth-footer a:hover{text-decoration:underline}
.plan-select{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:0.5rem}
.plan-opt{background:var(--bg3);border:1px solid var(--border);padding:10px 14px;cursor:pointer;transition:all 0.15s;text-align:left}
.plan-opt:hover{border-color:var(--amber2)}
.plan-opt.selected{border-color:var(--amber);background:var(--amber3)}
.plan-opt input{display:none}
.plan-name{font-size:13px;color:var(--text);font-family:var(--display);font-weight:600}
.plan-price{font-size:11px;color:var(--muted2);margin-top:2px;line-height:1.5}
.plan-opt.selected .plan-name{color:var(--amber)}
.inline-action{display:none}
.inline-action.show{display:block}
.billing-cycle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.cycle-opt{background:var(--bg3);border:1px solid var(--border);padding:10px 14px;cursor:pointer}
.cycle-opt.selected{border-color:var(--amber);background:var(--amber3)}
.cycle-title{font-size:12px;color:var(--text);font-family:var(--display)}
.cycle-copy{font-size:11px;color:var(--muted2);margin-top:3px;line-height:1.5}
@media (max-width: 640px){.plan-select{grid-template-columns:1fr}}
</style>
</head>
<body class="g-page">
<div class="auth-wrap">
  <div class="auth-card">
    <a class="auth-logo" href="/">guni<em>.dev</em></a>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Start protecting your AI agents from prompt injection, phishing, and goal hijacking.</p>

    <div class="auth-form">
      <div class="field">
        <label class="g-field-label">Plan</label>
        <div class="plan-select">
          <label class="plan-opt selected" id="plan-free" onclick="selectPlan('free')">
            <input type="radio" name="plan" value="free" checked/>
            <div class="plan-name">Free</div>
            <div class="plan-price">Self-hosted · Heuristics only</div>
          </label>
          <label class="plan-opt" id="plan-starter" onclick="selectPlan('starter')">
            <input type="radio" name="plan" value="starter"/>
            <div class="plan-name">Plus</div>
            <div class="plan-price">Hosted API · LLM layer · 1,000 scans</div>
          </label>
          <label class="plan-opt" id="plan-pro" onclick="selectPlan('pro')">
            <input type="radio" name="plan" value="pro"/>
            <div class="plan-name">Pro</div>
            <div class="plan-price">Production workflows · Priority support</div>
          </label>
        </div>
      </div>

      <div class="field" id="interval-wrap" style="display:none">
        <label class="g-field-label">Billing cycle</label>
        <div class="billing-cycle">
          <div class="cycle-opt selected" id="interval-monthly" onclick="selectInterval('monthly')">
            <div class="cycle-title">Monthly</div>
            <div class="cycle-copy" id="interval-monthly-copy">₹999/mo</div>
          </div>
          <div class="cycle-opt" id="interval-yearly" onclick="selectInterval('yearly')">
            <div class="cycle-title">Yearly</div>
            <div class="cycle-copy" id="interval-yearly-copy">₹7,490/yr</div>
          </div>
        </div>
      </div>

      <div class="field">
        <label class="g-field-label">Email</label>
        <input class="g-input" type="email" id="email" placeholder="you@company.com" autocomplete="email"/>
      </div>

      <div class="field">
        <label class="g-field-label">Full name <span style="color:var(--muted2)">(optional)</span></label>
        <input class="g-input" type="text" id="full-name" placeholder="Jane Smith" autocomplete="name"/>
      </div>

      <div class="field">
        <label class="g-field-label">Password</label>
        <input class="g-input" type="password" id="password" placeholder="Min 8 characters" autocomplete="new-password"/>
      </div>

      <div class="field">
        <label class="g-field-label">Confirm password</label>
        <input class="g-input" type="password" id="confirm" placeholder="Repeat password"/>
      </div>

      <div class="err" id="err"></div>
      <div class="ok" id="ok"></div>
      <button class="g-btn g-btn-outline inline-action" id="resend-btn" type="button">Resend verification email</button>

      <button class="g-btn g-btn-primary" id="signup-btn" style="padding:13px;font-size:13px" onclick="signup(this)">Create account</button>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="/signin">Sign in</a>
    </div>
  </div>
</div>

<script>
let selectedPlan = 'free';
let selectedInterval = 'monthly';

function selectPlan(plan) {
  selectedPlan = plan;
  document.getElementById('plan-free').classList.toggle('selected', plan === 'free');
  document.getElementById('plan-starter').classList.toggle('selected', plan === 'starter');
  document.getElementById('plan-pro').classList.toggle('selected', plan === 'pro');
  const intervalWrap = document.getElementById('interval-wrap');
  intervalWrap.style.display = plan === 'free' ? 'none' : 'block';
  document.getElementById('interval-monthly-copy').textContent = plan === 'pro' ? '₹4,999/mo' : '₹999/mo';
  document.getElementById('interval-yearly-copy').textContent = plan === 'pro' ? '₹23,990/yr' : '₹7,490/yr';
}

function selectInterval(interval) {
  selectedInterval = interval;
  document.getElementById('interval-monthly').classList.toggle('selected', interval === 'monthly');
  document.getElementById('interval-yearly').classList.toggle('selected', interval === 'yearly');
}

function apiErrorMessage(payload, fallback) {
  if (!payload) return fallback;
  if (typeof payload === 'string') return payload;
  if (payload.error) return payload.error;
  if (typeof payload.detail === 'string') return payload.detail;
  if (Array.isArray(payload.detail) && payload.detail.length) {
    return payload.detail.map(item => item.msg || item.message || String(item)).join(', ');
  }
  if (payload.message) return payload.message;
  return fallback;
}

async function signup(btnEl) {
  const email = document.getElementById('email').value.trim();
  const fullName = document.getElementById('full-name').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const err = document.getElementById('err');
  const ok = document.getElementById('ok');
  const resend = document.getElementById('resend-btn');

  err.classList.remove('show');
  ok.classList.remove('show');
  resend.classList.remove('show');

  if (!email || !email.includes('@')) { err.textContent = 'Enter a valid email.'; err.classList.add('show'); return; }
  if (password.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.classList.add('show'); return; }
  if (password !== confirm) { err.textContent = 'Passwords do not match.'; err.classList.add('show'); return; }

  const btn = btnEl || document.getElementById('signup-btn');
  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const r = await fetch('/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, full_name: fullName || null, password, plan: selectedPlan }),
    });
    const payload = await r.json().catch(() => null);
    if (!r.ok) {
      const message = apiErrorMessage(payload, 'Could not create account.');
      err.textContent = message;
      err.classList.add('show');
      if (r.status === 409 || message.toLowerCase().includes('exists')) {
        resend.classList.add('show');
      }
      return;
    }

    resend.classList.add('show');
    const data = payload && payload.data ? payload.data : payload;

    if (data && data.next_action === 'portal') {
      ok.textContent = 'Account created! Check your email to verify your account before signing in.';
      ok.classList.add('show');
      return;
    }

    ok.textContent = `Account created. Redirecting to ${selectedPlan === 'pro' ? 'Pro' : 'Plus'} checkout...`;
    ok.classList.add('show');

    const checkoutResponse = await fetch('/billing/checkout', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ plan: selectedPlan, interval: selectedInterval }),
    });
    const checkoutPayload = await checkoutResponse.json().catch(() => null);
    if (!checkoutResponse.ok) {
      err.textContent = apiErrorMessage(checkoutPayload, 'Your account was created, but checkout could not be started. Open billing from the portal to continue.');
      err.classList.add('show');
      return;
    }
    const checkoutData = checkoutPayload && checkoutPayload.data ? checkoutPayload.data : checkoutPayload;
    if (!checkoutData || !checkoutData.checkout_url) {
      err.textContent = 'Your account was created, but the checkout link was missing. Open billing from the portal to continue.';
      err.classList.add('show');
      return;
    }
    window.location.href = checkoutData.checkout_url;
  } catch (e) {
    err.textContent = 'Could not connect. Try again.';
    err.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create account';
  }
}

async function resendVerification() {
  const email = document.getElementById('email').value.trim();
  const err = document.getElementById('err');
  const ok = document.getElementById('ok');
  const btn = document.getElementById('resend-btn');
  if (!email || !email.includes('@')) {
    err.textContent = 'Enter your email first.';
    err.classList.add('show');
    return;
  }

  err.classList.remove('show');
  ok.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    const response = await fetch('/auth/resend-verification', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const payload = await response.json().catch(() => null);
    if (!response.ok) {
      err.textContent = apiErrorMessage(payload, 'Could not resend verification email.');
      err.classList.add('show');
      return;
    }
    ok.textContent = 'If your account exists and is still unverified, a new verification email is on the way.';
    ok.classList.add('show');
  } catch (error) {
    err.textContent = 'Could not resend verification email right now.';
    err.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Resend verification email';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') signup(); });
document.getElementById('resend-btn').addEventListener('click', resendVerification);

(() => {
  const params = new URLSearchParams(window.location.search);
  const plan = params.get('plan');
  const interval = params.get('interval');
  if (plan === 'starter' || plan === 'pro' || plan === 'free') selectPlan(plan);
  if (interval === 'monthly' || interval === 'yearly') selectInterval(interval);
})();
</script>
</body>
</html>
